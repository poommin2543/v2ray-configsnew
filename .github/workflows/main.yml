name: Update Configs
permissions: write-all

on:
  push:
    branches:
      - main
  schedule:
  
    - cron: "*/17 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: cd Files && pip install -r requirements.txt

    - name: Run Python script and save output to file
      run: cd Files && python app.py
      
    - name: Run Splitter script and save output to file
      run: cd Files && python sort.py
      
    - name: Build commit message (Bangkok)
      id: msg
      run: |
        echo "msg=$(TZ=Asia/Bangkok date '+%Y-%m-%d %H:%M ICT') 🔥❤️‍🔥 v2ray config" >> $GITHUB_OUTPUT
    - name: Commit and push files
      uses: EndBug/add-and-commit@v7
      with:
        author_name: "poommin2543"
        author_email: "poommin2543@gmail.com"
        message: "${{ steps.msg.outputs.msg }}"
        add: "."
        push: "https://github.com/poommin2543/v2ray-configsNew.git"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
